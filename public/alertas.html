<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Centro de Alertas - Sistema Axones">
    <title>Alertas - Sistema Axones</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d6efd">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="src/css/main.css" rel="stylesheet">
    <style>
        .alert-card {
            border-left: 4px solid;
            transition: all 0.2s;
        }
        .alert-card:hover {
            transform: translateX(5px);
        }
        .alert-card.warning { border-left-color: #ffc107; }
        .alert-card.danger { border-left-color: #dc3545; }
        .alert-card.info { border-left-color: #0dcaf0; }
        .alert-card.critical {
            border-left-color: #dc3545;
            background-color: #fff5f5;
        }
        .filter-btn.active {
            box-shadow: 0 0 0 2px rgba(13, 110, 253, 0.25);
        }
        .stat-badge {
            font-size: 1.5rem;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav id="navbar-placeholder" class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top" style="min-height:56px;"></nav>

    <!-- Main Content -->
    <main class="container-fluid" style="margin-top: 70px;">
        <!-- Header -->
        <section class="row mb-4">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center flex-wrap">
                    <div>
                        <h4 class="mb-1">
                            <i class="bi bi-bell text-danger me-2"></i>
                            Centro de Alertas
                        </h4>
                        <p class="text-muted mb-0">
                            <small>Gestion y seguimiento de alertas del sistema</small>
                        </p>
                    </div>
                    <div>
                        <button class="btn btn-outline-success btn-sm me-2" onclick="AlertasModule.marcarTodasLeidas()">
                            <i class="bi bi-check-all me-1"></i>Marcar todas leidas
                        </button>
                        <button class="btn btn-outline-secondary btn-sm" onclick="AlertasModule.cargarAlertas()">
                            <i class="bi bi-arrow-clockwise me-1"></i>Actualizar
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Estadisticas rapidas -->
        <section class="row mb-4 g-3">
            <div class="col-6 col-md-3">
                <div class="card border-0 shadow-sm text-center">
                    <div class="card-body py-3">
                        <div class="stat-badge bg-danger bg-opacity-10 text-danger mx-auto mb-2" id="statCriticas">0</div>
                        <small class="text-muted">Criticas</small>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card border-0 shadow-sm text-center">
                    <div class="card-body py-3">
                        <div class="stat-badge bg-warning bg-opacity-10 text-warning mx-auto mb-2" id="statAdvertencias">0</div>
                        <small class="text-muted">Advertencias</small>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card border-0 shadow-sm text-center">
                    <div class="card-body py-3">
                        <div class="stat-badge bg-info bg-opacity-10 text-info mx-auto mb-2" id="statInfo">0</div>
                        <small class="text-muted">Informativas</small>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card border-0 shadow-sm text-center">
                    <div class="card-body py-3">
                        <div class="stat-badge bg-success bg-opacity-10 text-success mx-auto mb-2" id="statResueltas">0</div>
                        <small class="text-muted">Resueltas Hoy</small>
                    </div>
                </div>
            </div>
        </section>

        <!-- Filtros -->
        <section class="row mb-4">
            <div class="col-12">
                <div class="card border-0 shadow-sm">
                    <div class="card-body py-2">
                        <div class="row g-2 align-items-center">
                            <div class="col-auto">
                                <span class="small fw-medium text-muted">Filtrar por:</span>
                            </div>
                            <div class="col-auto">
                                <div class="btn-group btn-group-sm" role="group">
                                    <button type="button" class="btn btn-outline-secondary filter-btn active" data-filter="todas">Todas</button>
                                    <button type="button" class="btn btn-outline-danger filter-btn" data-filter="pendiente">Pendientes</button>
                                    <button type="button" class="btn btn-outline-success filter-btn" data-filter="resuelta">Resueltas</button>
                                </div>
                            </div>
                            <div class="col-auto">
                                <select class="form-select form-select-sm" id="filtroTipo" style="min-width: 150px;">
                                    <option value="">Todos los tipos</option>
                                    <option value="refil_alto">Refil Alto</option>
                                    <option value="refil_critico">Refil Critico</option>
                                    <option value="produccion_baja">Produccion Baja</option>
                                    <option value="maquina_detenida">Maquina Detenida</option>
                                    <option value="tiempo_muerto_alto">Tiempo Muerto Alto</option>
                                    <option value="stock_bajo">Stock Bajo</option>
                                </select>
                            </div>
                            <div class="col-auto">
                                <select class="form-select form-select-sm" id="filtroMaquina" style="min-width: 150px;">
                                    <option value="">Todas las maquinas</option>
                                </select>
                            </div>
                            <div class="col-auto">
                                <input type="date" class="form-control form-control-sm" id="filtroFecha">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Lista de alertas -->
        <section class="row">
            <div class="col-12">
                <div id="listaAlertas">
                    <!-- Se llena dinamicamente -->
                </div>

                <!-- Sin alertas -->
                <div class="card border-0 shadow-sm" id="sinAlertas" style="display: none;">
                    <div class="card-body text-center py-5">
                        <i class="bi bi-check-circle display-1 text-success mb-3"></i>
                        <h5>No hay alertas</h5>
                        <p class="text-muted">El sistema esta funcionando correctamente</p>
                    </div>
                </div>

                <!-- Paginacion -->
                <div class="d-flex justify-content-between align-items-center mt-3" id="paginacion">
                    <small class="text-muted">Mostrando <span id="mostrando">0</span> de <span id="totalAlertas">0</span> alertas</small>
                    <div class="btn-group btn-group-sm">
                        <button class="btn btn-outline-secondary" id="btnAnterior" disabled>
                            <i class="bi bi-chevron-left"></i> Anterior
                        </button>
                        <button class="btn btn-outline-secondary" id="btnSiguiente" disabled>
                            Siguiente <i class="bi bi-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal de detalles -->
    <div class="modal fade" id="modalDetalle" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="bi bi-bell me-2"></i>Detalle de Alerta
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalDetalleBody">
                    <!-- Contenido dinamico -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    <button type="button" class="btn btn-success" id="btnResolver" onclick="AlertasModule.resolverAlerta()">
                        <i class="bi bi-check-circle me-1"></i>Marcar Resuelta
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-light border-top py-3 mt-4">
        <div class="container-fluid">
            <div class="row align-items-center">
                <div class="col-md-6 text-center text-md-start">
                    <small class="text-muted">
                        <i class="bi bi-gear-wide-connected me-1"></i>
                        Sistema Axones v1.0 - Inversiones Axones 2008, C.A.
                    </small>
                </div>
                <div class="col-md-6 text-center text-md-end">
                    <small class="text-muted">
                        <i class="bi bi-c-circle me-1"></i> 2026
                    </small>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="src/js/utils/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="src/js/utils/supabase-client.js"></script>
    <script src="src/js/utils/alertas-engine.js"></script>
    <script src="src/js/utils/api.js"></script>
    <script src="src/js/utils/sync-manager.js"></script>
    <script src="src/js/utils/sync-realtime.js"></script>
    <script src="src/js/utils/theme.js"></script>
    <script src="src/js/utils/auth.js"></script>
    <script src="src/js/modules/alertas.js"></script>
    <script src="src/js/utils/demoData.js"></script>
    <script src="src/js/main.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW:', err));
        }
    </script>
    <script src="src/js/modules/ayuda.js"></script>
    <script src="src/js/utils/navbar.js"></script>
</body>
</html>
