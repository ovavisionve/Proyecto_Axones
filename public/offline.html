<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin Conexion - Sistema Axones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .offline-card {
            background: white;
            border-radius: 20px;
            padding: 3rem;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .offline-icon {
            font-size: 5rem;
            color: #6c757d;
            margin-bottom: 1rem;
        }
        .pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <i class="bi bi-wifi-off offline-icon pulse"></i>
        <h2 class="mb-3">Sin Conexion</h2>
        <p class="text-muted mb-4">
            No hay conexion a internet. Algunas funciones pueden no estar disponibles.
        </p>
        <p class="small text-muted mb-4">
            Los datos ingresados se guardaran localmente y se sincronizaran cuando se restablezca la conexion.
        </p>
        <button class="btn btn-primary btn-lg" onclick="window.location.reload()">
            <i class="bi bi-arrow-clockwise me-2"></i>Reintentar
        </button>
        <hr class="my-4">
        <a href="index.html" class="btn btn-outline-secondary">
            <i class="bi bi-house me-2"></i>Ir al Inicio
        </a>
    </div>

    <script>
        // Check connection status
        window.addEventListener('online', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
