<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - Sistema Axones</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#212529">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="src/css/main.css" rel="stylesheet">
    <style>
        .table-productos td { vertical-align: middle; }
        .search-box { max-width: 400px; }
        @media (max-width: 1024px) {
            input, select, textarea { min-height: 2.4rem; font-size: 0.95rem; }
        }
        @media (max-width: 768px) {
            input, select, textarea { min-height: 2.8rem; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav id="navbar-placeholder" class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top" style="min-height:56px;"></nav>

    <!-- Main Content -->
    <main class="container-fluid" style="margin-top: 70px;">
        <!-- Header -->
        <div class="row mb-3">
            <div class="col">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                    <div>
                        <h4 class="mb-0"><i class="bi bi-box text-primary me-2"></i>Gestion de Productos</h4>
                        <small class="text-muted">Catalogo de productos terminados</small>
                    </div>
                    <div class="d-flex gap-2">
                        <div class="input-group search-box">
                            <span class="input-group-text"><i class="bi bi-search"></i></span>
                            <input type="text" class="form-control" id="buscarProducto" placeholder="Buscar producto...">
                        </div>
                        <button class="btn btn-primary" onclick="ProductosModule.mostrarModal()">
                            <i class="bi bi-plus-lg me-1"></i> Nuevo Producto
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="row mb-3">
            <div class="col-md-3">
                <div class="card border-0 shadow-sm">
                    <div class="card-body py-2 text-center">
                        <h5 class="mb-0" id="totalProductos">0</h5>
                        <small class="text-muted">Total Productos</small>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm">
                    <div class="card-body py-2 text-center">
                        <h5 class="mb-0 text-success" id="productosActivos">0</h5>
                        <small class="text-muted">Activos</small>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm">
                    <div class="card-body py-2 text-center">
                        <h5 class="mb-0 text-primary" id="totalClientes">0</h5>
                        <small class="text-muted">Clientes</small>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm">
                    <div class="card-body py-2 text-center">
                        <span class="badge bg-success" id="statusDB">
                            <i class="bi bi-circle-fill me-1" style="font-size:0.5rem;"></i> Conectado
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tabla de Productos -->
        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-productos mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>Nombre del Producto</th>
                                <th>SKU / CPE</th>
                                <th>Cliente</th>
                                <th>Estructura Material</th>
                                <th>Tipo Impresion</th>
                                <th>Ancho (mm)</th>
                                <th class="text-center">Estado</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tablaProductos">
                            <tr>
                                <td colspan="8" class="text-center py-4 text-muted">
                                    <i class="bi bi-hourglass-split me-2"></i>Cargando productos...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Crear/Editar Producto -->
    <div class="modal fade" id="modalProducto" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="modalProductoTitulo">
                        <i class="bi bi-box me-2"></i>Nuevo Producto
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formProducto">
                        <input type="hidden" id="productoId">
                        <div class="row g-3">
                            <div class="col-md-8">
                                <label class="form-label">Nombre del Producto <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="productoNombre" required placeholder="Ej: Bolsa Harina Pan 1Kg">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">SKU / CPE</label>
                                <input type="text" class="form-control" id="productoSKU" placeholder="Auto o manual">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Cliente</label>
                                <input type="text" class="form-control" id="productoCliente" list="dlClientes" placeholder="Seleccionar cliente...">
                                <datalist id="dlClientes"></datalist>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Estructura del Material</label>
                                <input type="text" class="form-control" id="productoEstructura" list="dlEstructuras" placeholder="Ej: BOPP + ADHESIVO + CAST">
                                <datalist id="dlEstructuras">
                                    <option value="BOPP + ADHESIVO + CAST">
                                    <option value="BOPP + ADHESIVO + PEBD">
                                    <option value="BOPP SUPERFICIE">
                                    <option value="BOPP + ADHESIVO + BOPP">
                                    <option value="BOPP MATE + ADHESIVO + CAST">
                                    <option value="METAL + ADHESIVO + PEBD">
                                    <option value="PET + ADHESIVO + PEBD">
                                </datalist>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Tipo Impresion</label>
                                <select class="form-select" id="productoTipoImpresion">
                                    <option value="">--</option>
                                    <option value="superficie">Superficie</option>
                                    <option value="reverso">Reverso</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Ancho (mm)</label>
                                <input type="number" class="form-control" id="productoAncho" min="0" step="1">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Desarrollo (mm)</label>
                                <input type="number" class="form-control" id="productoDesarrollo" min="0" step="0.1">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Colores</label>
                                <input type="number" class="form-control" id="productoNumColores" min="0" max="8" value="0">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Figura Embobinado</label>
                                <input type="text" class="form-control" id="productoFiguraEmb" list="dlFiguras">
                                <datalist id="dlFiguras">
                                    <option value="1"><option value="2"><option value="3"><option value="4">
                                    <option value="5"><option value="6"><option value="7"><option value="8">
                                </datalist>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Codigo de Barras</label>
                                <input type="text" class="form-control" id="productoCodigoBarras">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Notas</label>
                                <textarea class="form-control" id="productoNotas" rows="2"></textarea>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="ProductosModule.guardar()">
                        <i class="bi bi-check-lg me-1"></i> Guardar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="src/js/utils/config.js"></script>
    <script src="src/js/utils/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="src/js/utils/supabase-client.js"></script>
    <script src="src/js/utils/sync-realtime.js"></script>
    <script src="src/js/modules/productos.js"></script>
    <script src="src/js/utils/navbar.js"></script>
</body>
</html>
